<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARYA - Kelola Data Perusahaan (Admin)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :focus {
            outline: 2px solid #2563eb;
            outline-offset: 2px;
        }
        .modal-transition {
            transition: opacity 0.2s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <h1 class="text-2xl font-bold text-blue-800">Sistem KARYA</h1>
                <span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-sm">Admin Panel</span>
            </div>
            <div class="flex items-center space-x-4">
                <span class="text-gray-700">Admin: Elang Febryan</span>
                <button class="bg-red-600 text-white px-3 py-1 rounded hover:bg-red-700 focus:ring-2" aria-label="Logout">Logout</button>
            </div>
        </div>
    </header>

    <!-- Navigasi Tab -->
    <div class="bg-white border-b">
        <div class="container mx-auto px-4">
            <div class="flex space-x-6">
                <button class="tab-btn py-3 px-1 border-b-2 border-blue-600 text-blue-600 font-medium" data-tab="perusahaan">Kelola Perusahaan</button>
                <button class="tab-btn py-3 px-1 border-b-2 border-transparent text-gray-500 hover:text-gray-700" data-tab="registrasi">Registrasi Akun</button>
            </div>
        </div>
    </div>

    <main class="container mx-auto px-4 py-8">
        <!-- TAB 1: Kelola Perusahaan -->
        <div id="tab-perusahaan" class="tab-content">
            <div class="bg-white rounded-lg shadow-md p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-semibold text-gray-800">Daftar Perusahaan</h2>
                    <button id="tambah-perusahaan-btn" class="bg-green-600 text-white px-4 py-2 rounded-md hover:bg-green-700 focus:ring-2 flex items-center gap-2">
                        <span>+</span> Tambah Perusahaan
                    </button>
                </div>

                <!-- Filter & Pencarian -->
                <div class="flex flex-wrap gap-4 mb-6">
                    <div class="flex-1 min-w-[200px]">
                        <label for="search-perusahaan" class="block text-sm font-medium text-gray-700 mb-1">Cari Perusahaan</label>
                        <input type="text" id="search-perusahaan" placeholder="Nama / Email / Telepon..." class="w-full border border-gray-300 rounded-md p-2">
                    </div>
                    <div class="flex items-end">
                        <button id="btn-filter-perusahaan" class="bg-blue-700 text-white px-4 py-2 rounded-md hover:bg-blue-800">Cari</button>
                    </div>
                </div>

                <!-- Tabel Perusahaan -->
                <div class="overflow-x-auto">
                    <table class="min-w-full bg-white border border-gray-200">
                        <thead class="bg-gray-100">
                            <tr>
                                <th class="py-3 px-4 border-b text-left text-sm font-semibold text-gray-700">ID</th>
                                <th class="py-3 px-4 border-b text-left text-sm font-semibold text-gray-700">Nama Perusahaan</th>
                                <th class="py-3 px-4 border-b text-left text-sm font-semibold text-gray-700">Email</th>
                                <th class="py-3 px-4 border-b text-left text-sm font-semibold text-gray-700">Telepon</th>
                                <th class="py-3 px-4 border-b text-left text-sm font-semibold text-gray-700">Alamat</th>
                                <th class="py-3 px-4 border-b text-left text-sm font-semibold text-gray-700">Status</th>
                                <th class="py-3 px-4 border-b text-center text-sm font-semibold text-gray-700">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="table-perusahaan">
                            <!-- Data akan diisi JavaScript -->
                        </tbody>
                    </table>
                </div>

                <!-- Paginasi -->
                <div class="flex justify-between items-center mt-6">
                    <button id="prev-page" class="px-3 py-1 bg-gray-200 rounded disabled:opacity-50" disabled>Sebelumnya</button>
                    <span id="page-info" class="text-sm text-gray-600">Halaman 1 dari 1</span>
                    <button id="next-page" class="px-3 py-1 bg-gray-200 rounded disabled:opacity-50">Selanjutnya</button>
                </div>
            </div>
        </div>

        <!-- TAB 2: Registrasi Akun User (akan diisi terpisah) -->
        <div id="tab-registrasi" class="tab-content hidden">
            <!-- Konten registrasi akan di-load di bagian 2 -->
        </div>
    </main>

    <!-- MODAL TAMBAH/EDIT PERUSAHAAN -->
    <div id="modal-perusahaan" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden overflow-y-auto h-full w-full z-50">
        <div class="relative top-20 mx-auto p-5 border w-11/12 md:w-2/3 lg:w-1/2 shadow-lg rounded-md bg-white">
            <div class="flex justify-between items-center pb-3 border-b">
                <h3 id="modal-title" class="text-xl font-semibold text-gray-900">Tambah Perusahaan</h3>
                <button id="close-modal" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>
            <form id="form-perusahaan" class="mt-4">
                <input type="hidden" id="perusahaan-id">
                <div class="grid grid-cols-1 gap-4">
                    <div>
                        <label for="nama_perusahaan" class="block text-sm font-medium text-gray-700 mb-1">Nama Perusahaan <span class="text-red-500">*</span></label>
                        <input type="text" id="nama_perusahaan" required class="w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label for="email_perusahaan" class="block text-sm font-medium text-gray-700 mb-1">Email <span class="text-red-500">*</span></label>
                        <input type="email" id="email_perusahaan" required class="w-full border border-gray-300 rounded-md p-2">
                    </div>
                    <div>
                        <label for="telepon_perusahaan" class="block text-sm font-medium text-gray-700 mb-1">Telepon</label>
                        <input type="tel" id="telepon_perusahaan" class="w-full border border-gray-300 rounded-md p-2">
                    </div>
                    <div>
                        <label for="alamat_perusahaan" class="block text-sm font-medium text-gray-700 mb-1">Alamat</label>
                        <textarea id="alamat_perusahaan" rows="2" class="w-full border border-gray-300 rounded-md p-2"></textarea>
                    </div>
                    <div>
                        <label for="status_perusahaan" class="block text-sm font-medium text-gray-700 mb-1">Status</label>
                        <select id="status_perusahaan" class="w-full border border-gray-300 rounded-md p-2">
                            <option value="Aktif">Aktif</option>
                            <option value="Tidak Aktif">Tidak Aktif</option>
                            <option value="Menunggu Verifikasi">Menunggu Verifikasi</option>
                        </select>
                    </div>
                </div>
                <div class="flex justify-end space-x-3 mt-6">
                    <button type="button" id="cancel-modal" class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50">Batal</button>
                    <button type="submit" class="px-4 py-2 bg-blue-700 text-white rounded-md hover:bg-blue-800">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL KONFIRMASI HAPUS -->
    <div id="modal-hapus" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 max-w-sm mx-4">
            <h3 class="text-lg font-semibold text-gray-900 mb-4">Konfirmasi Hapus</h3>
            <p class="text-gray-600 mb-6">Apakah Anda yakin ingin menghapus perusahaan <span id="hapus-nama" class="font-bold"></span>? Data yang terkait juga akan hilang.</p>
            <div class="flex justify-end space-x-3">
                <button id="batal-hapus" class="px-4 py-2 border border-gray-300 rounded-md text-gray-700">Batal</button>
                <button id="konfirmasi-hapus" class="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700">Hapus</button>
            </div>
        </div>
    </div>

    <script>
        // Data dummy perusahaan
        let perusahaanData = [
            { id: 1, nama: "PT. Maju Jaya", email: "info@majujaya.com", telepon: "021-5551234", alamat: "Jl. Sudirman No. 45, Jakarta", status: "Aktif" },
            { id: 2, nama: "CV. Karya Mandiri", email: "karyamandiri@mail.com", telepon: "022-5556789", alamat: "Jl. Asia Afrika No. 12, Bandung", status: "Aktif" },
            { id: 3, nama: "PT. Digital Inklusif", email: "hi@digitalinklusif.id", telepon: "031-5554321", alamat: "Jl. Pemuda No. 89, Surabaya", status: "Menunggu Verifikasi" },
        ];

        let currentPage = 1;
        const rowsPerPage = 5;
        let filteredData = [...perusahaanData];
        let deleteId = null;

        function renderTable() {
            const start = (currentPage - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const pageData = filteredData.slice(start, end);
            const tbody = document.getElementById('table-perusahaan');
            tbody.innerHTML = '';
            
            if (pageData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center py-8 text-gray-500">Tidak ada data perusahaan</td></tr>';
                document.getElementById('page-info').innerText = 'Halaman 0 dari 0';
                return;
            }

            pageData.forEach(perusahaan => {
                const statusClass = perusahaan.status === 'Aktif' ? 'bg-green-100 text-green-800' : 
                                   (perusahaan.status === 'Tidak Aktif' ? 'bg-red-100 text-red-800' : 'bg-yellow-100 text-yellow-800');
                const row = document.createElement('tr');
                row.className = 'border-b hover:bg-gray-50';
                row.innerHTML = `
                    <td class="py-3 px-4">${perusahaan.id}</td>
                    <td class="py-3 px-4 font-medium">${perusahaan.nama}</td>
                    <td class="py-3 px-4">${perusahaan.email}</td>
                    <td class="py-3 px-4">${perusahaan.telepon || '-'}</td>
                    <td class="py-3 px-4 max-w-xs truncate">${perusahaan.alamat || '-'}</td>
                    <td class="py-3 px-4"><span class="px-2 py-1 rounded-full text-xs font-semibold ${statusClass}">${perusahaan.status}</span></td>
                    <td class="py-3 px-4 text-center">
                        <button class="text-blue-600 hover:text-blue-800 mr-3 edit-btn" data-id="${perusahaan.id}" aria-label="Edit">✏️ Edit</button>
                        <button class="text-red-600 hover:text-red-800 delete-btn" data-id="${perusahaan.id}" data-nama="${perusahaan.nama}" aria-label="Hapus">🗑️ Hapus</button>
                    </td>
                `;
                tbody.appendChild(row);
            });

            const totalPages = Math.ceil(filteredData.length / rowsPerPage) || 1;
            document.getElementById('page-info').innerText = `Halaman ${currentPage} dari ${totalPages}`;
            document.getElementById('prev-page').disabled = currentPage === 1;
            document.getElementById('next-page').disabled = currentPage === totalPages;
        }

        function applyFilter() {
            const searchText = document.getElementById('search-perusahaan').value.toLowerCase();
            filteredData = perusahaanData.filter(p => 
                p.nama.toLowerCase().includes(searchText) || 
                p.email.toLowerCase().includes(searchText) ||
                (p.telepon && p.telepon.includes(searchText))
            );
            currentPage = 1;
            renderTable();
        }

        // CRUD: Create / Update
        function openModal(perusahaan = null) {
            const modal = document.getElementById('modal-perusahaan');
            const title = document.getElementById('modal-title');
            if (perusahaan) {
                title.innerText = 'Edit Perusahaan';
                document.getElementById('perusahaan-id').value = perusahaan.id;
                document.getElementById('nama_perusahaan').value = perusahaan.nama;
                document.getElementById('email_perusahaan').value = perusahaan.email;
                document.getElementById('telepon_perusahaan').value = perusahaan.telepon || '';
                document.getElementById('alamat_perusahaan').value = perusahaan.alamat || '';
                document.getElementById('status_perusahaan').value = perusahaan.status;
            } else {
                title.innerText = 'Tambah Perusahaan';
                document.getElementById('form-perusahaan').reset();
                document.getElementById('perusahaan-id').value = '';
                document.getElementById('status_perusahaan').value = 'Aktif';
            }
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal-perusahaan').classList.add('hidden');
        }

        function savePerusahaan(event) {
            event.preventDefault();
            const id = document.getElementById('perusahaan-id').value;
            const newData = {
                nama: document.getElementById('nama_perusahaan').value,
                email: document.getElementById('email_perusahaan').value,
                telepon: document.getElementById('telepon_perusahaan').value,
                alamat: document.getElementById('alamat_perusahaan').value,
                status: document.getElementById('status_perusahaan').value,
            };

            if (id) {
                // Update
                const index = perusahaanData.findIndex(p => p.id == id);
                if (index !== -1) {
                    perusahaanData[index] = { ...perusahaanData[index], ...newData };
                    alert('Data perusahaan berhasil diperbarui');
                }
            } else {
                // Create - ID baru
                const newId = Math.max(...perusahaanData.map(p => p.id), 0) + 1;
                perusahaanData.push({ id: newId, ...newData });
                alert('Perusahaan berhasil ditambahkan');
            }
            closeModal();
            applyFilter();
        }

        // Delete
        function confirmDelete(id, nama) {
            deleteId = id;
            document.getElementById('hapus-nama').innerText = nama;
            document.getElementById('modal-hapus').classList.remove('hidden');
            document.getElementById('modal-hapus').style.display = 'flex';
        }

        function executeDelete() {
            if (deleteId) {
                perusahaanData = perusahaanData.filter(p => p.id !== deleteId);
                applyFilter();
                alert('Perusahaan berhasil dihapus');
            }
            closeDeleteModal();
        }

        function closeDeleteModal() {
            document.getElementById('modal-hapus').classList.add('hidden');
            document.getElementById('modal-hapus').style.display = 'none';
            deleteId = null;
        }

        // Event Listeners
        document.getElementById('tambah-perusahaan-btn').addEventListener('click', () => openModal());
        document.getElementById('close-modal').addEventListener('click', closeModal);
        document.getElementById('cancel-modal').addEventListener('click', closeModal);
        document.getElementById('form-perusahaan').addEventListener('submit', savePerusahaan);
        document.getElementById('btn-filter-perusahaan').addEventListener('click', applyFilter);
        document.getElementById('search-perusahaan').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') applyFilter();
        });
        document.getElementById('prev-page').addEventListener('click', () => { if(currentPage > 1) { currentPage--; renderTable(); } });
        document.getElementById('next-page').addEventListener('click', () => { 
            const totalPages = Math.ceil(filteredData.length / rowsPerPage);
            if(currentPage < totalPages) { currentPage++; renderTable(); }
        });
        document.getElementById('batal-hapus').addEventListener('click', closeDeleteModal);
        document.getElementById('konfirmasi-hapus').addEventListener('click', executeDelete);

        // Delegasi event untuk tombol edit dan delete di tabel
        document.getElementById('table-perusahaan').addEventListener('click', (e) => {
            if (e.target.classList.contains('edit-btn')) {
                const id = parseInt(e.target.getAttribute('data-id'));
                const perusahaan = perusahaanData.find(p => p.id === id);
                if (perusahaan) openModal(perusahaan);
            } else if (e.target.classList.contains('delete-btn')) {
                const id = parseInt(e.target.getAttribute('data-id'));
                const nama = e.target.getAttribute('data-nama');
                confirmDelete(id, nama);
            }
        });

        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.getAttribute('data-tab');
                document.querySelectorAll('.tab-btn').forEach(b => {
                    b.classList.remove('border-blue-600', 'text-blue-600');
                    b.classList.add('border-transparent', 'text-gray-500');
                });
                btn.classList.add('border-blue-600', 'text-blue-600');
                btn.classList.remove('border-transparent', 'text-gray-500');
                
                document.getElementById('tab-perusahaan').classList.add('hidden');
                document.getElementById('tab-registrasi').classList.add('hidden');
                
                if (tab === 'perusahaan') {
                    document.getElementById('tab-perusahaan').classList.remove('hidden');
                } else if (tab === 'registrasi') {
                    document.getElementById('tab-registrasi').classList.remove('hidden');
                    loadRegistrasiTab();
                }
            });
        });

        function loadRegistrasiTab() {
            const registrasiContainer = document.getElementById('tab-registrasi');
            registrasiContainer.innerHTML = `
                <div class="bg-white rounded-lg shadow-md p-6">
                    <h2 class="text-2xl font-semibold text-gray-800 mb-6">Registrasi Akun Baru</h2>
                    <form id="form-registrasi" class="max-w-2xl">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="md:col-span-2">
                                <label class="block text-sm font-medium text-gray-700 mb-2">Pilih Role <span class="text-red-500">*</span></label>
                                <div class="flex space-x-4">
                                    <label class="inline-flex items-center">
                                        <input type="radio" name="role" value="penyandang" class="form-radio text-blue-600" checked> 
                                        <span class="ml-2">Penyandang Disabilitas</span>
                                    </label>
                                    <label class="inline-flex items-center">
                                        <input type="radio" name="role" value="perusahaan" class="form-radio text-blue-600"> 
                                        <span class="ml-2">Perusahaan</span>
                                    </label>
                                </div>
                            </div>
                            <div>
                                <label for="reg_nama" class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap <span class="text-red-500">*</span></label>
                                <input type="text" id="reg_nama" required class="w-full border border-gray-300 rounded-md p-2">
                            </div>
                            <div>
                                <label for="reg_email" class="block text-sm font-medium text-gray-700 mb-1">Email <span class="text-red-500">*</span></label>
                                <input type="email" id="reg_email" required class="w-full border border-gray-300 rounded-md p-2">
                            </div>
                            <div>
                                <label for="reg_password" class="block text-sm font-medium text-gray-700 mb-1">Password <span class="text-red-500">*</span></label>
                                <input type="password" id="reg_password" required class="w-full border border-gray-300 rounded-md p-2">
                                <p class="text-xs text-gray-500 mt-1">Minimal 6 karakter</p>
                            </div>
                            <div>
                                <label for="reg_konfirmasi" class="block text-sm font-medium text-gray-700 mb-1">Konfirmasi Password <span class="text-red-500">*</span></label>
                                <input type="password" id="reg_konfirmasi" required class="w-full border border-gray-300 rounded-md p-2">
                            </div>
                            <div id="field_telepon">
                                <label for="reg_telepon" class="block text-sm font-medium text-gray-700 mb-1">Nomor Telepon</label>
                                <input type="tel" id="reg_telepon" class="w-full border border-gray-300 rounded-md p-2">
                            </div>
                            <div id="field_alamat" class="md:col-span-2">
                                <label for="reg_alamat" class="block text-sm font-medium text-gray-700 mb-1">Alamat</label>
                                <textarea id="reg_alamat" rows="2" class="w-full border border-gray-300 rounded-md p-2"></textarea>
                            </div>
                            <div id="field_jenis_disabilitas" class="md:col-span-2">
                                <label for="reg_jenis_disabilitas" class="block text-sm font-medium text-gray-700 mb-1">Jenis Disabilitas</label>
                                <select id="reg_jenis_disabilitas" class="w-full border border-gray-300 rounded-md p-2">
                                    <option value="">Pilih jenis disabilitas</option>
                                    <option value="Fisik (daksa)">Fisik (daksa)</option>
                                    <option value="Netra">Netra</option>
                                    <option value="Rungu">Rungu</option>
                                    <option value="Mental">Mental</option>
                                    <option value="Lainnya">Lainnya</option>
                                </select>
                            </div>
                            <div id="field_nama_perusahaan" class="md:col-span-2 hidden">
                                <label for="reg_nama_perusahaan" class="block text-sm font-medium text-gray-700 mb-1">Nama Perusahaan <span class="text-red-500">*</span></label>
                                <input type="text" id="reg_nama_perusahaan" class="w-full border border-gray-300 rounded-md p-2">
                            </div>
                        </div>
                        <div class="flex justify-end space-x-3 mt-8">
                            <button type="reset" class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50">Reset</button>
                            <button type="submit" class="px-4 py-2 bg-blue-700 text-white rounded-md hover:bg-blue-800">Daftarkan Akun</button>
                        </div>
                    </form>
                    <div id="daftar-akun-terbaru" class="mt-8">
                        <h3 class="text-lg font-semibold text-gray-800 mb-3">Akun yang baru didaftarkan</h3>
                        <div id="akun-terbaru-list" class="space-y-2">
                            <p class="text-gray-500 text-sm">Belum ada akun yang didaftarkan</p>
                        </div>
                    </div>
                </div>
            `;
            initRegistrasiForm();
        }

        function initRegistrasiForm() {
            const roleRadios = document.querySelectorAll('input[name="role"]');
            const fieldJenisDisabilitas = document.getElementById('field_jenis_disabilitas');
            const fieldNamaPerusahaan = document.getElementById('field_nama_perusahaan');
            const fieldTelepon = document.getElementById('field_telepon');
            const fieldAlamat = document.getElementById('field_alamat');

            function toggleFields() {
                const isPenyandang = document.querySelector('input[name="role"]:checked').value === 'penyandang';
                if (isPenyandang) {
                    fieldJenisDisabilitas.classList.remove('hidden');
                    fieldNamaPerusahaan.classList.add('hidden');
                    document.getElementById('reg_nama_perusahaan').removeAttribute('required');
                    document.getElementById('reg_jenis_disabilitas').setAttribute('required', 'required');
                } else {
                    fieldJenisDisabilitas.classList.add('hidden');
                    fieldNamaPerusahaan.classList.remove('hidden');
                    document.getElementById('reg_jenis_disabilitas').removeAttribute('required');
                    document.getElementById('reg_nama_perusahaan').setAttribute('required', 'required');
                }
            }

            roleRadios.forEach(radio => radio.addEventListener('change', toggleFields));
            toggleFields();

            const form = document.getElementById('form-registrasi');
            const akunList = [];
            
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const password = document.getElementById('reg_password').value;
                const konfirmasi = document.getElementById('reg_konfirmasi').value;
                
                if (password !== konfirmasi) {
                    alert('Password dan konfirmasi password tidak cocok!');
                    return;
                }
                if (password.length < 6) {
                    alert('Password minimal 6 karakter!');
                    return;
                }

                const role = document.querySelector('input[name="role"]:checked').value;
                const newAkun = {
                    id: Date.now(),
                    nama: document.getElementById('reg_nama').value,
                    email: document.getElementById('reg_email').value,
                    role: role === 'penyandang' ? 'Penyandang Disabilitas' : 'Perusahaan',
                    telepon: document.getElementById('reg_telepon').value,
                    alamat: document.getElementById('reg_alamat').value,
                    detail: role === 'penyandang' ? 
                        { jenisDisabilitas: document.getElementById('reg_jenis_disabilitas').value } : 
                        { namaPerusahaan: document.getElementById('reg_nama_perusahaan').value }
                };

                akunList.unshift(newAkun);
                updateAkunList(akunList);
                form.reset();
                toggleFields();
                alert('Akun berhasil didaftarkan! Silakan user login dengan email dan password yang diberikan.');
            });
        }

        function updateAkunList(akunList) {
            const container = document.getElementById('akun-terbaru-list');
            if (akunList.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-sm">Belum ada akun yang didaftarkan</p>';
                return;
            }
            container.innerHTML = akunList.slice(0, 5).map(akun => `
                <div class="bg-gray-50 p-3 rounded flex justify-between items-center">
                    <div>
                        <p class="font-medium">${akun.nama}</p>
                        <p class="text-sm text-gray-600">${akun.email} • ${akun.role}</p>
                    </div>
                    <span class="text-xs text-green-600 bg-green-100 px-2 py-1 rounded">Terdaftar</span>
                </div>
            `).join('');
        }

        // Inisialisasi awal
        renderTable();
    </script>
</body>
</html>
